name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build addon zip
        run: |
          mkdir -p build/AutoHeroicQueue
          cp AutoHeroicQueue.toc AutoHeroicQueue.lua build/AutoHeroicQueue/
          cd build
          zip -r ../AutoHeroicQueue.zip AutoHeroicQueue

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: AutoHeroicQueue.zip
          generate_release_notes: true
